version: '3.8'

services:
  # ========================
  # Backend — FastAPI
  # ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaidyamitra-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - API_RELOAD=False
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========================
  # Frontend — Next.js
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaidyamitra-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ========================
  # Nginx — Reverse Proxy
  # ========================
  nginx:
    image: nginx:alpine
    container_name: vaidyamitra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
